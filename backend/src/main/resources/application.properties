spring.application.name=online-course-management-portal
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/course_portal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.jwt.secret=${JWT_SECRET:change-this-secret-key-to-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
server.port=8080
