services:
  mysql:
    image: mysql:8.4
    container_name: course-portal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: course_portal
    ports:
      - "3306:3306"
    volumes:
      - course_portal_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  course_portal_mysql:
